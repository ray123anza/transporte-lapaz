<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>RutaBO</title>

    <!-- LEAFLET -->

    <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- CSS -->

    <link
    rel="stylesheet"
    href="style.css">

</head>

<body>

    <div class="app">

        <!-- =========================
             SPLASH SCREEN
        ========================== -->

        <div id="splashScreen"
        class="splash-screen">

            <div class="splash-content">

                <div class="splash-logo">

                    RutaBO

                </div>

                <div class="splash-subtitle">

                    Navega el transporte público de La Paz

                </div>

            </div>

        </div>

        <!-- =========================
             HEADER
        ========================== -->

        <!-- HEADER -->

<div class="header">

    <div class="header-left">

        <div class="menu-btn">

            ☰

        </div>

        <div class="logo">

            RutaBO

        </div>

    </div>

    <!-- BOTON COLAPSAR -->

    <button
    id="toggleSearch"
    class="collapse-btn">

        ⌃

    </button>

</div>

        <!-- =========================
             SEARCH BOX
        ========================== -->

        <div
class="search-box"
id="searchBox">

            <!-- ORIGEN -->

            <div class="input-container">

                <label>

                    ¿Dónde estás?

                </label>

                <button
                id="openOrigin"
                class="fake-input">

                    Seleccionar ubicación

                </button>

            </div>

            <!-- DESTINO -->

            <div class="input-container">

                <label>

                    ¿A dónde quieres ir?

                </label>

                <button
                id="openDestination"
                class="fake-input">

                    Seleccionar destino

                </button>

            </div>

            <!-- BOTON -->

            <button
            id="buscarRuta"
            disabled>

                Buscar rutas

            </button>

        </div>

        <!-- =========================
             MAPA
        ========================== -->

        <div id="map"></div>

        <!-- =========================
             LOADING
        ========================== -->

        <div
        id="loadingScreen"
        class="loading-screen hidden">

            <div class="loading-card">

                <div class="loader"></div>

                <h2>

                    Buscando rutas

                </h2>

                <p>

                    Analizando opciones de transporte...

                </p>

            </div>

        </div>

        <!-- =========================
             MODAL ORIGEN
        ========================== -->

        <div
        id="originModal"
        class="selection-modal hidden">

            <div class="modal-content">

                <div class="modal-header">

                    Selecciona tu ubicación

                </div>

                <button
                class="location-option"
                onclick="seleccionarOrigen('Bolognia Calle 1')">

                    📍 Bolognia Calle 1

                </button>

            </div>

        </div>

        <!-- =========================
             MODAL DESTINO
        ========================== -->

        <div
        id="destinationModal"
        class="selection-modal hidden">

            <div class="modal-content">

                <div class="modal-header">

                    Selecciona tu destino

                </div>

                <button
                class="location-option"
                onclick="seleccionarDestino('Universidad Católica Boliviana “San Pablo”')">

                    🎯 Universidad Católica Boliviana "San Pablo"

                </button>

            </div>

        </div>

        <!-- =========================
             PANEL RUTAS
        ========================== -->

        <div
        class="routes-panel hidden"
        id="routesPanel">

            <!-- TABS -->

            <div class="tabs">

                <button
                class="tab-btn active"
                onclick="mostrarRuta(1, this)">

                    Opción 1

                </button>

                <button
                class="tab-btn"
                onclick="mostrarRuta(2, this)">

                    Opción 2

                </button>

                <button
                class="tab-btn"
                onclick="mostrarRuta(3, this)">

                    Opción 3

                </button>

            </div>

            <!-- CONTENIDO -->

            <div class="route-content">

                <div
                class="route-visual"
                id="routeVisual">

                </div>

            </div>

        </div>

    </div>

    <!-- =========================
         LEAFLET
    ========================== -->

    <script
    src="https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <!-- =========================
         OMNIVORE
    ========================== -->

    <script
    src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js">
    </script>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script src="script.js"></script>

</body>

</html>
